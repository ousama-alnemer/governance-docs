<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Portal Navigation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f2f1;
      padding: 2rem;
      min-height: 100vh;
    }

    .nav-wrapper {
      max-width: 900px;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid #c8c6c4;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 400;
      border: 1px solid #c8c6c4;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      background: #ffffff;
      color: #605e5c;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }

    .tab-btn:hover:not(.active) {
      background: #f3f2f1;
      color: #323130;
    }

    .tab-btn.active {
      font-weight: 600;
      background: #deecf9;
      color: #0078d4;
      border-color: #c8c6c4;
      border-bottom: 2px solid #0078d4;
    }

    .tab-btn i {
      font-size: 14px;
    }

    .tab-btn.active i {
      color: #0078d4;
    }

    .flame-icon {
      color: #e67e22;
    }

    .tab-content {
      background: #ffffff;
      border: 1px solid #c8c6c4;
      border-top: none;
      border-radius: 0 0 4px 4px;
      padding: 1.5rem;
      min-height: 120px;
    }

    .tab-content p {
      font-size: 13px;
      color: #605e5c;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="nav-wrapper">
    <div class="tab-bar">
      <button class="tab-btn" id="tab-0" onclick="setTab(0)">
        <i class="ti ti-shield"></i> Azure Governance
      </button>
      <button class="tab-btn" id="tab-1" onclick="setTab(1)">
        <i class="ti ti-flame flame-icon"></i> Cost Management
      </button>
      <button class="tab-btn active" id="tab-2" onclick="setTab(2)">
        <i class="ti ti-lock"></i> Security &amp; Compliance
      </button>
      <button class="tab-btn" id="tab-3" onclick="setTab(3)">
        <i class="ti ti-building"></i> Architecture
      </button>
      <button class="tab-btn" id="tab-4" onclick="setTab(4)">
        <i class="ti ti-tool"></i> Shared Services
      </button>
    </div>
    <div class="tab-content">
      <p id="content-text">Security &amp; Compliance — active tab content area.</p>
    </div>
  </div>

  <script>
    const tabs = [
      "Azure Governance — policies, blueprints, and management groups.",
      "Cost Management — budgets, alerts, and spending analysis.",
      "Security & Compliance — active tab content area.",
      "Architecture — design patterns, diagrams, and infrastructure layout.",
      "Shared Services — networking, DNS, monitoring, and shared infrastructure.",
    ];

    function setTab(idx) {
      tabs.forEach((_, i) => {
        document.getElementById('tab-' + i).classList.toggle('active', i === idx);
      });
      document.getElementById('content-text').textContent = tabs[idx];
    }
  </script>
</body>
</html>
