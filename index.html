<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ousama Alnemer — Document Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1120;
  --surface:#111827;
  --card:#1a2235;
  --card2:#1f2a40;
  --border:#2a3548;
  --accent:#38bdf8;
  --accent2:#34d399;
  --accent3:#f472b6;
  --accent4:#fb923c;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --word:#60a5fa;
  --img:#a78bfa;
  --html:#34d399;
  --pdf:#f87171;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{
  padding:36px 40px 28px;
  background:linear-gradient(180deg,#0d1526 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:20px;
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,#0ea5e9,#6366f1);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 0 24px rgba(14,165,233,.4);
}
.brand h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.3px}
.brand p{font-size:12px;color:var(--muted);margin-top:2px}
.header-right{display:flex;gap:20px}
.hstat{text-align:right}
.hstat-n{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent)}
.hstat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}

/* TOOLBAR */
.toolbar{
  padding:16px 40px;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky;top:0;z-index:99;
}
.search-box{
  flex:1;min-width:200px;position:relative;
}
.search-box input{
  width:100%;padding:10px 14px 10px 40px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,.15)}
.search-box input::placeholder{color:var(--muted)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  padding:7px 14px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.on{background:var(--accent);border-color:var(--accent);color:#0b1120;font-weight:700}

/* MAIN */
.main{padding:32px 40px;max-width:1400px;margin:0 auto}

/* CATEGORY */
.cat{margin-bottom:44px;animation:up .4s ease both}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.cat-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:18px;padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.cat-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cat-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.cat-badge{margin-left:auto;font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2px 10px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}

/* CARD */
.doc-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  text-decoration:none;color:var(--text);
  display:flex;flex-direction:column;
  transition:transform .18s,box-shadow .18s,border-color .18s;
  animation:up .4s ease both;
}
.doc-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:var(--accent)}
.thumb{
  height:116px;display:flex;align-items:center;justify-content:center;
  font-size:40px;position:relative;overflow:hidden;
  background:var(--card2);
}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.doc-card:hover .thumb img{transform:scale(1.06)}
.thumb-word{background:linear-gradient(135deg,#1e3a5f,#1a2235)}
.thumb-img{background:linear-gradient(135deg,#2d1b4e,#1a2235)}
.thumb-html{background:linear-gradient(135deg,#0d3028,#1a2235)}
.thumb-pdf{background:linear-gradient(135deg,#3b1212,#1a2235)}
.thumb-other{background:linear-gradient(135deg,#2a1f0e,#1a2235)}
.body{padding:12px 14px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
.doc-name{font-size:13px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.doc-foot{display:flex;align-items:center;gap:6px;margin-top:2px}
.tbadge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:5px}
.tb-word{background:rgba(96,165,250,.15);color:var(--word)}
.tb-img{background:rgba(167,139,250,.15);color:var(--img)}
.tb-html{background:rgba(52,211,153,.15);color:var(--html)}
.tb-pdf{background:rgba(248,113,113,.15);color:var(--pdf)}
.tb-other{background:rgba(251,146,60,.15);color:var(--accent4)}
.doc-size{font-size:11px;color:var(--muted);margin-left:auto}

/* ADD CARD */
.add-card{
  background:transparent;border:1.5px dashed var(--border);
  border-radius:14px;min-height:168px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--muted);font-size:13px;cursor:pointer;
  transition:border-color .2s,color .2s,background .2s;
}
.add-card:hover{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.04)}

/* NO RESULTS */
#nores{display:none;text-align:center;padding:64px 20px;color:var(--muted)}
#nores.show{display:block}
#nores svg{opacity:.25;margin-bottom:14px}
#nores h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}

@media(max-width:768px){
  .header,.toolbar,.main{padding-left:20px;padding-right:20px}
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-logo">📁</div>
    <div>
      <h1>Document Portal</h1>
      <p>Ousama Alnemer — Internal Resources</p>
    </div>
  </div>
  <div class="header-right">
    <div class="hstat"><div class="hstat-n" id="sTotal">0</div><div class="hstat-l">Documents</div></div>
    <div class="hstat"><div class="hstat-n" id="sCats">0</div><div class="hstat-l">Categories</div></div>
  </div>
</div>

<div class="toolbar">
  <div class="search-box">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Search documents…"/>
  </div>
  <div class="pills" id="pills">
    <button class="pill on" data-f="all">All</button>
    <button class="pill" data-f="word">📄 Word</button>
    <button class="pill" data-f="img">🖼 Images</button>
    <button class="pill" data-f="html">🌐 HTML</button>
    <button class="pill" data-f="pdf">📕 PDF</button>
  </div>
</div>

<div class="main">
  <div id="nores">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <h3>No documents found</h3>
    <p>Try a different search or filter</p>
  </div>
  <div id="cats"></div>
</div>

<script>
// ════════════════════════════════════════════
//  ADD YOUR FILES HERE
// ════════════════════════════════════════════
const DOCS = [
  {
    name: "Azure Governance & Compliance",
    path: "governance.html",
    type: "html",
    cat: "Governance",
    size: "Interactive"
  },
  {
    name: "Entra Group Manager",
    path: "EntraGroupManager.zip",
    type: "other",
    cat: "Other",
    size: ""
  },
  {
    name: "Corti",
    path: "images/Corti.png",
    type: "img",
    cat: "Images",
    size: ""
  },
  {
    name: "DRC",
    path: "images/DRC.png",
    type: "img",
    cat: "Images",
    size: ""
  },
  {
    name: "Networking",
    path: "images/Networking.png",
    type: "img",
    cat: "Images",
    size: ""
  },
  {
    name: "Broker Change",
    path: "images/brokerchange.png",
    type: "img",
    cat: "Images",
    size: ""
  },
];

// ════════════════════════════════════════════
//  CATEGORY ICONS & COLORS
// ════════════════════════════════════════════
const CATS = {
  "Tools":       {ico:"🔧", color:"#fb923c"},
  "Governance":  {ico:"🏛", color:"#38bdf8"},
  "Policies":    {ico:"📋", color:"#34d399"},
  "Security":    {ico:"🔒", color:"#f87171"},
  "Diagrams":    {ico:"🗺", color:"#a78bfa"},
  "Images":      {ico:"🖼", color:"#c084fc"},
  "Templates":   {ico:"📐", color:"#fb923c"},
  "Reports":     {ico:"📊", color:"#60a5fa"},
  "Other":       {ico:"📁", color:"#94a3b8"},
};

const ICONS  = {word:"📄",img:"🖼",html:"🌐",pdf:"📕",other:"📎"};
const LABELS = {word:"Word",img:"Image",html:"HTML",pdf:"PDF",other:"File"};
const TBADGE = {word:"tb-word",img:"tb-img",html:"tb-html",pdf:"tb-pdf",other:"tb-other"};
const TTHUMB = {word:"thumb-word",img:"thumb-img",html:"thumb-html",pdf:"thumb-pdf",other:"thumb-other"};

let filter="all", search="";

function card(doc){
  const a=document.createElement("a");
  a.className="doc-card";
  a.href=doc.path;
  a.target=doc.type==="html"?"_self":"_blank";
  a.dataset.type=doc.type;
  a.dataset.name=doc.name.toLowerCase();

  const thumb = doc.type==="img"
    ? `<div class="thumb ${TTHUMB[doc.type]||'thumb-other'}"><img src="${doc.path}" alt="${doc.name}" loading="lazy" onerror="this.parentElement.innerHTML='🖼'"/></div>`
    : `<div class="thumb ${TTHUMB[doc.type]||'thumb-other'}">${ICONS[doc.type]||"📎"}</div>`;

  a.innerHTML=`${thumb}
    <div class="body">
      <div class="doc-name">${doc.name}</div>
      <div class="doc-foot">
        <span class="tbadge ${TBADGE[doc.type]||'tb-other'}">${LABELS[doc.type]||"File"}</span>
        ${doc.size?`<span class="doc-size">${doc.size}</span>`:""}
      </div>
    </div>`;
  return a;
}

function addCard(){
  const d=document.createElement("div");
  d.className="add-card";
  d.innerHTML=`<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>Upload via GitHub</span>`;
  d.onclick=()=>window.open("https://github.com/ousama-alnemer/governance-docs/upload/main","_blank");
  return d;
}

function render(){
  const container=document.getElementById("cats");
  container.innerHTML="";
  const nr=document.getElementById("nores");

  const filtered=DOCS.filter(d=>{
    const mf=filter==="all"||d.type===filter;
    const ms=d.name.toLowerCase().includes(search)||(d.cat||"").toLowerCase().includes(search);
    return mf&&ms;
  });

  if(!filtered.length){nr.classList.add("show");document.getElementById("sTotal").textContent=0;return;}
  nr.classList.remove("show");

  const groups={};
  filtered.forEach(d=>{const c=d.cat||"Other";if(!groups[c])groups[c]=[];groups[c].push(d);});

  let delay=0;
  Object.entries(groups).forEach(([cname,docs])=>{
    const cfg=CATS[cname]||{ico:"📁",color:"#94a3b8"};
    const sec=document.createElement("div");
    sec.className="cat";
    sec.style.animationDelay=delay+"ms";
    delay+=60;

    sec.innerHTML=`<div class="cat-head">
      <div class="cat-ico" style="background:${cfg.color}20">${cfg.ico}</div>
      <span class="cat-name">${cname}</span>
      <span class="cat-badge">${docs.length} file${docs.length!==1?"s":""}</span>
    </div>`;

    const grid=document.createElement("div");
    grid.className="grid";
    docs.forEach((doc,i)=>{const c=card(doc);c.style.animationDelay=(delay+i*35)+"ms";grid.appendChild(c);});
    grid.appendChild(addCard());
    sec.appendChild(grid);
    container.appendChild(sec);
    delay+=docs.length*35+40;
  });

  document.getElementById("sTotal").textContent=filtered.length;
  const cats=new Set(filtered.map(d=>d.cat||"Other"));
  document.getElementById("sCats").textContent=cats.size;
}

document.getElementById("search").addEventListener("input",e=>{search=e.target.value.toLowerCase().trim();render();});
document.getElementById("pills").addEventListener("click",e=>{
  const b=e.target.closest(".pill");if(!b)return;
  document.querySelectorAll(".pill").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");filter=b.dataset.f;render();
});

// initial stats
document.getElementById("sTotal").textContent=DOCS.length;
document.getElementById("sCats").textContent=new Set(DOCS.map(d=>d.cat||"Other")).size;
render();
</script>
</body>
</html>
